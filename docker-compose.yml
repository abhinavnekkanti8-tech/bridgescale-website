version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: platform_db
    environment:
      POSTGRES_USER: ${DB_USER:-platform}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-platform_dev}
      POSTGRES_DB: ${DB_NAME:-platform_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: platform_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
